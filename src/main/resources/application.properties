spring.application.name=toDoList

# URL de conexão (troque 'meu_banco' pelo nome que você criou no Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5443/todo_db
spring.datasource.username=postgres
spring.datasource.password=sua_senha_aqui

# JPA/Hibernate: Isso cria as tabelas automaticamente baseado no seu código Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect